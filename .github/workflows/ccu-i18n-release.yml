name: CCU i18n release

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Optional upstream rust-v tag; latest stable release is used when empty
        required: false
        type: string
      revision:
        description: CCU revision for this upstream release
        required: true
        default: "1"
        type: string
      patch_ref:
        description: Fork branch containing the CCU i18n commits
        required: false
        type: string
      prepared_ref:
        description: Optional pre-resolved release branch for a known upstream conflict
        required: false
        type: string

concurrency:
  group: ccu-i18n-release
  cancel-in-progress: false

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
      issues: write
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      upstream_version: ${{ steps.prepare.outputs.upstream_version }}
      upstream_tag: ${{ steps.prepare.outputs.upstream_tag }}
      upstream_commit: ${{ steps.prepare.outputs.upstream_commit }}
      revision: ${{ steps.prepare.outputs.revision }}
      display_version: ${{ steps.prepare.outputs.display_version }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_branch: ${{ steps.prepare.outputs.release_branch }}
      fork_commit: ${{ steps.prepare.outputs.fork_commit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare upstream-aligned release branch
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.upstream_tag }}
          REQUESTED_REVISION: ${{ inputs.revision || '1' }}
          PATCH_REF: ${{ inputs.patch_ref || github.event.repository.default_branch }}
          PREPARED_REF: ${{ inputs.prepared_ref }}
        run: |
          set -euo pipefail

          upstream_tag="$REQUESTED_TAG"
          if [[ -z "$upstream_tag" ]]; then
            upstream_tag="$(gh api repos/openai/codex/releases/latest --jq .tag_name)"
          fi
          [[ "$upstream_tag" =~ ^rust-v([0-9]+\.[0-9]+\.[0-9]+)$ ]] || {
            echo "Unsupported upstream release tag: $upstream_tag" >&2
            exit 1
          }
          upstream_version="${BASH_REMATCH[1]}"
          revision="$REQUESTED_REVISION"
          [[ "$revision" =~ ^[1-9][0-9]*$ ]] || {
            echo "Revision must be a positive integer" >&2
            exit 1
          }
          git check-ref-format --branch "$PATCH_REF" >/dev/null || {
            echo "Patch ref must be a valid branch name" >&2
            exit 1
          }

          display_version="${upstream_version}-ccu.i18n.${revision}"
          release_tag="ccu-rust-v${upstream_version}-r${revision}"
          release_branch="ccu/release/${upstream_version}-r${revision}"
          agent_base_branch="ccu/agent-base/${upstream_version}-r${revision}"

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $release_tag already exists; nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git remote add upstream https://github.com/openai/codex.git 2>/dev/null || true
          git fetch --no-tags upstream main
          git fetch --no-tags upstream "refs/tags/$upstream_tag:refs/tags/$upstream_tag"
          upstream_commit="$(git rev-list -n 1 "$upstream_tag")"
          upstream_main_commit="$(git rev-parse refs/remotes/upstream/main)"

          if [[ -n "$PREPARED_REF" ]]; then
            if [[ "$PREPARED_REF" != "$release_branch" ]]; then
              echo "Prepared ref must be the expected release branch $release_branch" >&2
              exit 1
            fi
            git fetch --no-tags origin \
              "refs/heads/$PREPARED_REF:refs/remotes/origin/ccu-prepared-release"
            prepared_commit="$(git rev-parse refs/remotes/origin/ccu-prepared-release)"
            if ! git merge-base --is-ancestor "$upstream_commit" "$prepared_commit"; then
              echo "Prepared ref $PREPARED_REF is not based on $upstream_tag" >&2
              exit 1
            fi
            if [[ -n "$(git rev-list --merges "$upstream_commit..$prepared_commit")" ]]; then
              echo "Prepared ref $PREPARED_REF must contain only linear release patches" >&2
              exit 1
            fi
            invalid_paths="$(
              git diff --name-only "$upstream_commit..$prepared_commit" |
                grep -Ev '^(codex-rs/|\.github/scripts/ccu-package-release\.ps1$)' || true
            )"
            if [[ -n "$invalid_paths" ]]; then
              echo "Prepared ref modifies paths outside the release allowlist:" >&2
              echo "$invalid_paths" >&2
              exit 1
            fi
            if git diff --quiet "$upstream_commit..$prepared_commit" -- codex-rs; then
              echo "Prepared ref contains no codex-rs changes" >&2
              exit 1
            fi
            {
              echo "should_release=true"
              echo "upstream_version=$upstream_version"
              echo "upstream_tag=$upstream_tag"
              echo "upstream_commit=$upstream_commit"
              echo "revision=$revision"
              echo "display_version=$display_version"
              echo "release_tag=$release_tag"
              echo "release_branch=$release_branch"
              echo "fork_commit=$prepared_commit"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "$PATCH_REF:refs/remotes/origin/ccu-patch-source"
          patch_commit="$(git rev-parse refs/remotes/origin/ccu-patch-source)"

          mapfile -t patch_commits < <(
            git rev-list --reverse --no-merges \
              "upstream/main..refs/remotes/origin/ccu-patch-source"
          )
          if [[ "${#patch_commits[@]}" -eq 0 ]]; then
            echo "No fork-only commits were found on $PATCH_REF" >&2
            exit 1
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch --detach "$upstream_commit"
          git switch -c "$release_branch"

          for commit in "${patch_commits[@]}"; do
            if ! git cherry-pick "$commit"; then
              conflicts="$(git diff --name-only --diff-filter=U || true)"
              if [[ -z "$conflicts" ]] && git diff --quiet && git diff --cached --quiet; then
                git cherry-pick --skip
                continue
              fi
              git cherry-pick --abort || true
              title="[CCU sync] $release_tag needs manual rebase"
              body_file="$(mktemp)"
              conflict_paths_json="$(
                printf '%s\n' "$conflicts" |
                  jq -Rsc 'split("\n") | map(select(length > 0))'
              )"
              metadata="$(
                jq -nc \
                  --arg upstream_version "$upstream_version" \
                  --arg upstream_tag "$upstream_tag" \
                  --arg upstream_commit "$upstream_commit" \
                  --arg upstream_main_commit "$upstream_main_commit" \
                  --arg revision "$revision" \
                  --arg release_tag "$release_tag" \
                  --arg release_branch "$release_branch" \
                  --arg agent_base_branch "$agent_base_branch" \
                  --arg patch_ref "$PATCH_REF" \
                  --arg patch_commit "$patch_commit" \
                  --arg failed_commit "$commit" \
                  --argjson conflict_paths "$conflict_paths_json" \
                  '{
                    schema_version: 1,
                    upstream_version: $upstream_version,
                    upstream_tag: $upstream_tag,
                    upstream_commit: $upstream_commit,
                    upstream_main_commit: $upstream_main_commit,
                    revision: ($revision | tonumber),
                    release_tag: $release_tag,
                    release_branch: $release_branch,
                    agent_base_branch: $agent_base_branch,
                    patch_ref: $patch_ref,
                    patch_commit: $patch_commit,
                    failed_commit: $failed_commit,
                    conflict_paths: $conflict_paths
                  }'
              )"

              remote_base_commit="$(
                git ls-remote origin "refs/heads/$agent_base_branch" | awk '{print $1}'
              )"
              if [[ -n "$remote_base_commit" && "$remote_base_commit" != "$upstream_commit" ]]; then
                echo "Agent base branch exists at a different commit; refusing to overwrite it." >&2
                exit 1
              fi
              if [[ -z "$remote_base_commit" ]]; then
                git push origin "$upstream_commit:refs/heads/$agent_base_branch"
              fi

              gh label create ccu-sync-conflict \
                --repo "$GITHUB_REPOSITORY" \
                --color D93F0B \
                --description "Upstream replay requires agentic conflict resolution" \
                --force
              gh label create ccu-agent-resolution \
                --repo "$GITHUB_REPOSITORY" \
                --color 5319E7 \
                --description "Prepared by the CCU conflict resolver" \
                --force
              gh label create ccu-agent-prepared \
                --repo "$GITHUB_REPOSITORY" \
                --color 1D76DB \
                --description "Agent prepared a release branch for deterministic CI" \
                --force
              gh label create ccu-agent-resolved \
                --repo "$GITHUB_REPOSITORY" \
                --color 0E8A16 \
                --description "Deterministic release completed after agent resolution" \
                --force
              gh label create ccu-upstream-i18n \
                --repo "$GITHUB_REPOSITORY" \
                --color FBCA04 \
                --description "Upstream may now provide an official i18n interface" \
                --force

              {
                echo "<!-- ccu-sync-metadata:$metadata -->"
                echo
                echo "Automatic replay of fork commit \`$commit\` onto \`$upstream_tag\` failed."
                echo
                echo "Patch source: \`$PATCH_REF\`"
                echo "Patch commit: \`$patch_commit\`"
                echo "Upstream commit: \`$upstream_commit\`"
                echo "Upstream main snapshot: \`$upstream_main_commit\`"
                echo "Agent base branch: \`$agent_base_branch\`"
                echo "Expected release branch: \`$release_branch\`"
                echo
                echo "Conflicted paths:"
                echo '```text'
                echo "${conflicts:-unknown}"
                echo '```'
                echo
                echo "The release branch was not created or overwritten. The CCU conflict resolver will inspect upstream i18n support and either prepare a reviewed release branch or mark this issue for migration."
              } > "$body_file"
              issue_number="$(
                gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
                  --json number,title |
                  jq -r --arg title "$title" '.[] | select(.title == $title) | .number' |
                  head -n 1
              )"
              if [[ -z "$issue_number" ]]; then
                issue_url="$(
                  gh issue create --repo "$GITHUB_REPOSITORY" \
                    --title "$title" \
                    --body-file "$body_file" \
                    --label ccu-sync-conflict
                )"
                issue_number="${issue_url##*/}"
              else
                gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" \
                  --body-file "$body_file" \
                  --add-label ccu-sync-conflict
              fi

              gh workflow run ccu-conflict-resolver.lock.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref "${{ github.event.repository.default_branch }}" \
                -f "issue_number=$issue_number"
              echo "Dispatched CCU conflict resolver for issue #$issue_number" >&2
              exit 1
            fi
          done

          fork_commit="$(git rev-parse HEAD)"
          remote_commit="$(git ls-remote origin "refs/heads/$release_branch" | awk '{print $1}')"
          if [[ -n "$remote_commit" && "$remote_commit" != "$fork_commit" ]]; then
            echo "Release branch already exists at a different commit; refusing to overwrite it." >&2
            exit 1
          fi
          if [[ -z "$remote_commit" ]]; then
            git push origin "HEAD:refs/heads/$release_branch"
          fi

          {
            echo "should_release=true"
            echo "upstream_version=$upstream_version"
            echo "upstream_tag=$upstream_tag"
            echo "upstream_commit=$upstream_commit"
            echo "revision=$revision"
            echo "display_version=$display_version"
            echo "release_tag=$release_tag"
            echo "release_branch=$release_branch"
            echo "fork_commit=$fork_commit"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CODEX_CCU_BUILD_VERSION: ${{ needs.prepare.outputs.display_version }}
      LIBSQLITE3_FLAGS: SQLITE_DISABLE_INTRINSIC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.release_branch }}
          persist-credentials: false

      - name: Configure build directory
        shell: pwsh
        run: |
          "CARGO_TARGET_DIR=$env:RUNNER_TEMP\cargo-target" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure MSVC environment
        uses: ./.github/actions/setup-msvc-env
        with:
          target: x86_64-pc-windows-msvc

      - name: Verify i18n contract
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo test -p codex-tui i18n::tests --locked
          cargo test -p codex-tui ccu_theme --locked
          cargo test -p codex-tui status_line --locked
          cargo test -p codex-tui footer::tests --locked
          cargo test -p codex-tui session_header --locked
          cargo check -p codex-cli --locked

      - name: Build Windows x64 Codex
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target x86_64-pc-windows-msvc --release --locked --bin codex

      - name: Verify fork version and package release
        shell: pwsh
        env:
          UPSTREAM_VERSION: ${{ needs.prepare.outputs.upstream_version }}
          UPSTREAM_TAG: ${{ needs.prepare.outputs.upstream_tag }}
          UPSTREAM_COMMIT: ${{ needs.prepare.outputs.upstream_commit }}
          FORK_COMMIT: ${{ needs.prepare.outputs.fork_commit }}
          REVISION: ${{ needs.prepare.outputs.revision }}
          DISPLAY_VERSION: ${{ needs.prepare.outputs.display_version }}
        run: |
          $binary = Join-Path $env:CARGO_TARGET_DIR 'x86_64-pc-windows-msvc\release\codex.exe'
          $version = (& $binary --version | Out-String).Trim()
          if ($version -notmatch [regex]::Escape($env:DISPLAY_VERSION)) {
            throw "codex --version returned '$version', expected $env:DISPLAY_VERSION"
          }
          & .\.github\scripts\ccu-package-release.ps1 `
            -UpstreamVersion $env:UPSTREAM_VERSION `
            -UpstreamTag $env:UPSTREAM_TAG `
            -UpstreamCommit $env:UPSTREAM_COMMIT `
            -ForkCommit $env:FORK_COMMIT `
            -Revision ([int]$env:REVISION) `
            -DisplayVersion $env:DISPLAY_VERSION `
            -BinaryPath $binary `
            -OutputDirectory (Join-Path $env:RUNNER_TEMP 'ccu-release')

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ccu-i18n-release-${{ needs.prepare.outputs.display_version }}
          path: ${{ runner.temp }}\ccu-release\*
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ccu-i18n-release-${{ needs.prepare.outputs.display_version }}
          path: release-assets

      - name: Publish fork release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          DISPLAY_VERSION: ${{ needs.prepare.outputs.display_version }}
          UPSTREAM_TAG: ${{ needs.prepare.outputs.upstream_tag }}
          UPSTREAM_COMMIT: ${{ needs.prepare.outputs.upstream_commit }}
          FORK_COMMIT: ${{ needs.prepare.outputs.fork_commit }}
          RELEASE_BRANCH: ${{ needs.prepare.outputs.release_branch }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          CCU i18n 构建 ${DISPLAY_VERSION}

          - 上游版本 / Upstream release: ${UPSTREAM_TAG}
          - 上游提交 / Upstream commit: ${UPSTREAM_COMMIT}
          - fork 提交 / Fork commit: ${FORK_COMMIT}
          - 平台 / Platform: Windows x64
          - 语言包和主题包由 Codex CLI Ultra 独立分发，二进制内始终保留英文逐条回退。
          EOF
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$FORK_COMMIT" \
            --title "$DISPLAY_VERSION" \
            --notes-file release-notes.md \
            --latest

          conflict_title="[CCU sync] $RELEASE_TAG needs manual rebase"
          issue_number="$(
            gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
              --json number,title |
              jq -r --arg title "$conflict_title" '.[] | select(.title == $title) | .number' |
              head -n 1
          )"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" \
              --add-label ccu-agent-resolved
            gh issue close "$issue_number" --repo "$GITHUB_REPOSITORY" \
              --reason completed \
              --comment "Deterministic validation and release completed: \`$RELEASE_TAG\`."
          fi

          pr_number="$(
            gh pr list --repo "$GITHUB_REPOSITORY" --state open \
              --head "$RELEASE_BRANCH" --json number --jq '.[0].number // empty'
          )"
          if [[ -n "$pr_number" ]]; then
            gh pr close "$pr_number" --repo "$GITHUB_REPOSITORY" \
              --comment "Release branch validated and published as \`$RELEASE_TAG\`; closing this audit PR without merging it into the agent base branch."
          fi
